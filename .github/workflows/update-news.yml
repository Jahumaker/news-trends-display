name: Päivitä ja julkaise

on:
  schedule:
    - cron: '* * * * *'  # GitHub min ~5min, app polls every 1min
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Hae uutisdata
        run: python scripts/fetch_news.py

      - name: Commitoi päivitetty data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --cached --quiet || git commit -m "📰 Uutisdata päivitetty $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
